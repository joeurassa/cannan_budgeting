<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<header class="container header">
  <div class="header-top">
    <div>
      <h1>Budget Tracker</h1>
      <p class="muted">Local demo (UI + localStorage). Backend integration is next.</p>
    </div>

    <button id="themeToggle" class="btn outline" type="button" aria-label="Toggle dark and light mode">
      Switch Theme
    </button>
  </div>
</header>


  <main class="container grid">
    <!-- Left: Form -->
    <section class="card">
      <h2>Add Transaction</h2>

      <form id="txForm" novalidate>
        <div class="field">
          <label for="type">Type</label>
          <select id="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div class="field">
          <label for="amount">Amount</label>
          <input id="amount" inputmode="decimal" placeholder="e.g., 12.34" required />
          <p class="help">Use dollars and cents (max 2 decimals).</p>
        </div>

        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="date" required />
          <p class="help">Choose any date from January 1, 1946 through today.</p>
        </div>

        <div class="field">
          <label for="category">Category</label>
          <input id="category" placeholder="e.g., Food" required />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <input id="description" placeholder="e.g., Groceries" required />
        </div>

        <div id="formError" class="error" role="alert" aria-live="polite"></div>

        <button class="btn primary" type="submit">Add</button>
      </form>
    </section>

    <!-- Right: Dashboard -->
    <section class="card">
      <h2>Summary</h2>

      <div class="cards">
        <div class="mini">
          <div class="label">Income</div>
          <div class="value" id="incomeTotal">$0.00</div>
        </div>
        <div class="mini">
          <div class="label">Expenses</div>
          <div class="value" id="expenseTotal">$0.00</div>
        </div>
        <div class="mini">
          <div class="label">Balance</div>
          <div class="value" id="balanceTotal">$0.00</div>
        </div>
      </div>

      <h3 class="mt">Transactions</h3>
      <div class="tableWrap">
        <table class="table" aria-label="Transactions table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Amount</th>
              <th>Category</th>
              <th>Description</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>

      <button class="btn danger outline mt" id="clearAll" type="button">Clear All</button>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
